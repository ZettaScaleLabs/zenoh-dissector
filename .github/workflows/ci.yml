name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: "0 6 * * 1-5"

env:
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  markdown_lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          config: ".markdownlint.yaml"
          globs: "**/README.md"

  # ---------------------------------------------------------------------------
  # Rust-only job: builds and tests zenoh-codec-ffi without Wireshark headers.
  # ---------------------------------------------------------------------------
  rust:
    name: Rust (zenoh-codec-ffi, no Wireshark)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Code format check
        run: cargo fmt -p zenoh-codec-ffi -- --check

      - name: Clippy
        run: cargo clippy -p zenoh-codec-ffi --all-targets -- --deny warnings

      - name: Build
        run: cargo build -p zenoh-codec-ffi -j4

      - name: Unit tests
        run: cargo test -p zenoh-codec-ffi --lib -j4

  # ---------------------------------------------------------------------------
  # C plugin job: needs Wireshark headers, builds the C plugin via cmake,
  # and runs the full integration test suite via tshark.
  # ---------------------------------------------------------------------------
  c_plugin:
    name: C plugin + integration tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-2022
            platform: windows

    steps:
      - uses: actions/checkout@v4

      - uses: hustcer/setup-nu@v3
        with:
          version: "0.100"

      - name: Extract Wireshark version from Cargo.toml
        id: wireshark-version
        shell: nu {0}
        run: |
          let version = (open Cargo.toml | get workspace.metadata.wireshark_version)
          $"version=($version)" | save --append $env.GITHUB_OUTPUT

      - name: Install Wireshark (Ubuntu)
        if: matrix.platform == 'linux'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt install -y software-properties-common
          sudo add-apt-repository -y ppa:wireshark-dev/stable-staging
          sudo apt-get update -y
          EXPECTED="${{ steps.wireshark-version.outputs.version }}"
          PKG_VER=$(apt-cache madison libwireshark-dev | awk '{print $3}' | grep "^${EXPECTED}" | head -1)
          if [ -z "$PKG_VER" ]; then
            echo "ERROR: libwireshark-dev ${EXPECTED} not found. Available:"
            apt-cache madison libwireshark-dev | awk '{print $3}'
            exit 1
          fi
          sudo apt install -y libwireshark-dev="$PKG_VER" wireshark tshark cmake

      - name: Install Wireshark (macOS)
        if: matrix.platform == 'macos'
        run: |
          brew install --cask wireshark
          brew install cmake
          # Expose Wireshark frameworks as a flat lib dir for CMake find_library
          WS_FW=/Applications/Wireshark.app/Contents/Frameworks
          ln -sf "$(find $WS_FW -name 'libwireshark.*.dylib' | sort | tail -1)" libwireshark.dylib
          ln -sf "$(find $WS_FW -name 'libwiretap.*.dylib'   | sort | tail -1)" libwiretap.dylib
          ln -sf "$(find $WS_FW -name 'libwsutil.*.dylib'    | sort | tail -1)" libwsutil.dylib
          echo "WIRESHARK_LIB_DIR=${{ github.workspace }}" >> "$GITHUB_ENV"

      - name: Install Wireshark (Windows)
        if: matrix.platform == 'windows'
        run: choco install -y --no-progress wireshark cmake

      - name: Build Rust cdylib
        run: cargo build -p zenoh-codec-ffi -j4

      - name: Build C plugin (cmake)
        shell: bash
        run: |
          case "${{ matrix.platform }}" in
            windows) FFI_LIB="$(pwd)/target/debug/zenoh_codec_ffi.dll" ;;
            macos)   FFI_LIB="$(pwd)/target/debug/libzenoh_codec_ffi.dylib" ;;
            *)       FFI_LIB="$(pwd)/target/debug/libzenoh_codec_ffi.so" ;;
          esac
          cmake -B _tmp/cmake-build -S . -DZENOH_CODEC_FFI_LIB="$FFI_LIB"
          cmake --build _tmp/cmake-build --config Debug -j4

      - name: Install plugin
        shell: nu {0}
        run: |
          let platform = "${{ matrix.platform }}"
          let full_version = "${{ steps.wireshark-version.outputs.version }}"
          let maj_min = ($full_version | split row '.' | first 2 | str join '.')
          let plugin_dir = $"($env.HOME)/.local/lib/wireshark/plugins/($maj_min)/epan"
          mkdir $plugin_dir

          match $platform {
            "linux" => {
              cp _tmp/cmake-build/packet-zenoh.so $"($plugin_dir)/packet-zenoh.so"
              cp target/debug/libzenoh_codec_ffi.so $"($plugin_dir)/libzenoh_codec_ffi.so"
            }
            "macos" => {
              cp _tmp/cmake-build/packet-zenoh.so $"($plugin_dir)/packet-zenoh.so"
              cp target/debug/libzenoh_codec_ffi.dylib $"($plugin_dir)/libzenoh_codec_ffi.dylib"
            }
            "windows" => {
              cp _tmp/cmake-build/Debug/packet-zenoh.dll $"($plugin_dir)/packet-zenoh.dll"
              cp target/debug/zenoh_codec_ffi.dll $"($plugin_dir)/zenoh_codec_ffi.dll"
            }
          }

      - name: Test with sample data
        shell: nu {0}
        run: |
          let output = (tshark -r ./assets/sample-data.pcap | complete).stdout
          let zenoh_count = ($output | lines | where {|line| $line =~ "Zenoh"} | length)
          if $zenoh_count != 7 {
            error make {msg: $"Expected 7 Zenoh packets, found ($zenoh_count)"}
          }

      - name: Integration tests (via tshark)
        run: cargo test -p zenoh-codec-ffi --test dissector -- --test-threads=1

  ci:
    name: CI status checks
    runs-on: ubuntu-latest
    needs:
      - rust
      - c_plugin
      - markdown_lint
    if: always()
    steps:
      - name: Check whether all jobs pass
        run: echo '${{ toJson(needs) }}' | jq -e 'all(.result == "success")'
