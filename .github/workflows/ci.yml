name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: "0 6 * * 1-5"

env:
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  markdown_lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          config: ".markdownlint.yaml"
          globs: "**/README.md"

  # ---------------------------------------------------------------------------
  # Rust-only job: builds and tests zenoh-codec-ffi without Wireshark headers.
  # ---------------------------------------------------------------------------
  rust:
    name: Rust (zenoh-codec-ffi, no Wireshark)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Code format check
        run: cargo fmt -p zenoh-codec-ffi -- --check

      - name: Clippy
        run: cargo clippy -p zenoh-codec-ffi --all-targets -- --deny warnings

      - name: Build
        run: cargo build -p zenoh-codec-ffi -j4

      - name: Unit tests
        run: cargo test -p zenoh-codec-ffi --lib -j4

  # ---------------------------------------------------------------------------
  # C plugin job: needs Wireshark headers, builds the C plugin via cmake,
  # and runs the full integration test suite via tshark.
  # ---------------------------------------------------------------------------
  c_plugin:
    name: C plugin + integration tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
          - os: macos-latest
            platform: macos

    steps:
      - uses: actions/checkout@v4

      - uses: hustcer/setup-nu@v3
        with:
          version: "0.100"

      - name: Extract Wireshark version from Cargo.toml
        id: wireshark-version
        shell: nu {0}
        run: |
          let version = (open Cargo.toml | get workspace.metadata.wireshark_version)
          $"version=($version)" | save --append $env.GITHUB_OUTPUT

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Install Wireshark (Ubuntu)
        if: matrix.platform == 'linux'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt install -y software-properties-common
          sudo add-apt-repository -y ppa:wireshark-dev/stable-staging
          sudo apt install -y libwireshark-dev wireshark tshark cmake

      - name: Install Wireshark (macOS)
        if: matrix.platform == 'macos'
        run: |
          brew install --cask wireshark
          brew install cmake
          ln -snf $(find /Applications/Wireshark.app/Contents/Frameworks -name "libwireshark.*.dylib" | tail -n 1) libwireshark.dylib
          ln -snf $(find /Applications/Wireshark.app/Contents/Frameworks -name "libwiretap.*.dylib" | tail -n 1) libwiretap.dylib
          ln -snf $(find /Applications/Wireshark.app/Contents/Frameworks -name "libwsutil.*.dylib" | tail -n 1) libwsutil.dylib
        env:
          WIRESHARK_LIB_DIR: ${{ github.workspace }}

      - name: Build Rust cdylib
        run: cargo build -p zenoh-codec-ffi -j4

      - name: Build C plugin (cmake)
        run: |
          cmake -B _tmp/cmake-build -S .
          cmake --build _tmp/cmake-build -j4
        env:
          WIRESHARK_LIB_DIR: ${{ matrix.platform == 'macos' && github.workspace || '' }}

      - name: Install plugin
        shell: nu {0}
        run: |
          let platform = "${{ matrix.platform }}"
          let full_version = "${{ steps.wireshark-version.outputs.version }}"
          let base_version = ($full_version | split row '.' | first 2 | str join '.')
          let version = if $platform == "macos" { $base_version | str replace '.' '-' } else { $base_version }
          let plugin_dir = $"($env.HOME)/.local/lib/wireshark/plugins/($version)/epan"
          mkdir -v $plugin_dir
          cp -v _tmp/cmake-build/packet-zenoh.so $"($plugin_dir)/packet-zenoh.so"
          cp -v target/debug/libzenoh_codec_ffi.so $"($plugin_dir)/libzenoh_codec_ffi.so"

      - name: Test with sample data
        shell: nu {0}
        run: |
          let output = tshark -r ./assets/sample-data.pcap
          let zenoh_count = ($output | lines | where {|line| $line =~ "Zenoh"} | length)
          if $zenoh_count != 7 {
            error make {msg: $"Expected 7 Zenoh packets, found ($zenoh_count)"}
          }

      - name: Integration tests (via tshark)
        run: cargo test -p zenoh-codec-ffi --test dissector -j1

  ci:
    name: CI status checks
    runs-on: ubuntu-latest
    needs:
      - rust
      - c_plugin
      - markdown_lint
    if: always()
    steps:
      - name: Check whether all jobs pass
        run: echo '${{ toJson(needs) }}' | jq -e 'all(.result == "success")'
