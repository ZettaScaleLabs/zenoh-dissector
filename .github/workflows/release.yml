name: Release

on:
  schedule:
    - cron: "0 0 * * 1-5"
  workflow_dispatch:
    inputs:
      live-run:
        type: boolean
        description: Live-run
        required: false
        default: false
      version:
        type: string
        description: Release number
        required: false
      zenoh-version:
        type: string
        description: Zenoh Release number
        required: false
      branch:
        type: string
        description: Release branch
        required: false

env:
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.create-release-branch.outputs.version }}
      branch: ${{ steps.create-release-branch.outputs.branch }}
    steps:
      - id: create-release-branch
        uses: eclipse-zenoh/ci/create-release-branch@main
        with:
          repo: ${{ github.repository }}
          live-run: ${{ inputs.live-run || false }}
          version: ${{ inputs.version }}
          branch: ${{ inputs.branch }}
          github-token: ${{ secrets.BOT_TOKEN_WORKFLOW }}

      - uses: eclipse-zenoh/ci/bump-crates@main
        with:
          repo: ${{ github.repository }}
          live-run: ${{ inputs.live-run || false }}
          version: ${{ steps.create-release-branch.outputs.version }}
          branch: ${{ steps.create-release-branch.outputs.branch }}
          bump-deps-pattern: ${{ inputs.zenoh-version && 'zenoh.*' || '' }}
          bump-deps-version: ${{ inputs.zenoh-version }}
          bump-deps-branch: ${{ inputs.zenoh-version && format('release/{0}', inputs.zenoh-version) || '' }}
          toolchain: "1.85.0"
          github-token: ${{ secrets.BOT_TOKEN_WORKFLOW }}

  builds:
    name: Build for ${{ matrix.build.target }} on ${{ matrix.build.os }}
    runs-on: ${{ matrix.build.os }}
    needs: tag
    strategy:
      fail-fast: false
      matrix:
        build:
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-24.04, platform: linux }
          - { target: aarch64-apple-darwin,     os: macos-14,      platform: macos }

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.branch }}

      - uses: hustcer/setup-nu@v3
        with:
          version: "0.100"

      - name: Extract Wireshark version from Cargo.toml
        id: wireshark-version
        shell: nu {0}
        run: |
          let version = (open Cargo.toml | get workspace.metadata.wireshark_version)
          $"version=($version)" | save --append $env.GITHUB_OUTPUT

      - name: Install dependencies (Ubuntu)
        if: matrix.build.platform == 'linux'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt install -y software-properties-common
          sudo add-apt-repository -y ppa:wireshark-dev/stable-staging
          sudo apt-get update -y
          EXPECTED="${{ steps.wireshark-version.outputs.version }}"
          PKG_VER=$(apt-cache madison libwireshark-dev | awk '{print $3}' | grep "^${EXPECTED}" | head -1)
          if [ -z "$PKG_VER" ]; then
            echo "ERROR: libwireshark-dev ${EXPECTED} not found. Available:"
            apt-cache madison libwireshark-dev | awk '{print $3}'
            exit 1
          fi
          sudo apt install -y libwireshark-dev="$PKG_VER" wireshark tshark cmake

      - name: Install dependencies (macOS)
        if: matrix.build.platform == 'macos'
        run: |
          brew install --cask wireshark
          brew install cmake
          WS_FW=/Applications/Wireshark.app/Contents/Frameworks
          ln -sf "$(find $WS_FW -name 'libwireshark.*.dylib' | sort | tail -1)" libwireshark.dylib
          ln -sf "$(find $WS_FW -name 'libwiretap.*.dylib'   | sort | tail -1)" libwiretap.dylib
          ln -sf "$(find $WS_FW -name 'libwsutil.*.dylib'    | sort | tail -1)" libwsutil.dylib
          echo "WIRESHARK_LIB_DIR=${{ github.workspace }}" >> "$GITHUB_ENV"

      - name: Build Rust cdylib
        run: cargo build -p zenoh-codec-ffi --release -j4

      - name: Build C plugin (cmake)
        run: |
          cmake -B _tmp/cmake-build -S . \
            -DZENOH_CODEC_FFI_LIB="$(pwd)/target/release/libzenoh_codec_ffi${{ matrix.build.platform == 'macos' && '.dylib' || '.so' }}"
          cmake --build _tmp/cmake-build -j4

      - name: Package
        id: package
        shell: bash
        run: |
          PKG_NAME="zenoh-dissector-${{ needs.tag.outputs.version }}-${{ matrix.build.target }}.zip"
          PKG_PATH="${GITHUB_WORKSPACE}/${PKG_NAME}"
          if [[ "${{ matrix.build.platform }}" == "linux" ]]; then
            zip -j "${PKG_PATH}" \
              _tmp/cmake-build/packet-zenoh.so \
              target/release/libzenoh_codec_ffi.so
          else
            zip -j "${PKG_PATH}" \
              _tmp/cmake-build/packet-zenoh.so \
              target/release/libzenoh_codec_ffi.dylib
          fi
          echo "name=${PKG_NAME}" >> "$GITHUB_OUTPUT"
          echo "path=${PKG_PATH}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.name }}
          path: ${{ steps.package.outputs.path }}
          if-no-files-found: error

  publish:
    if: ${{ inputs.live-run || false }}
    name: Release publication
    needs: [tag, builds]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.branch }}

      - uses: hustcer/setup-nu@v3
        with:
          version: "0.100"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ARTIFACTS

      - name: Generate release note
        shell: nu {0}
        run: |
          print "Compute sha256sum"
          mkdir zip_files
          cp ARTIFACTS/*/*.zip zip_files
          cd zip_files
          let sha256sum = (ls *.zip | each {|file| $"(open --raw $file.name | hash sha256)  ($file.name)"} | str join "\n")
          print $sha256sum
          cd ..

          print "Record versions from Cargo.toml"
          let metadata = (cargo metadata --format-version 1 | from json)
          let pkg_ver = ($metadata.packages | where name == "zenoh-codec-ffi" | get version | first)
          let zenoh_ver = ($metadata.packages | where name == "zenoh-protocol" | get version | first)
          let wireshark_ver = (open Cargo.toml | get workspace.metadata.wireshark_version)

          print $"Package version: ($pkg_ver)"
          print $"Zenoh version: ($zenoh_ver)"
          print $"Wireshark version: ($wireshark_ver)"

          let template = (open .github/workflows/release-note.md)
          let note = ($template
            | str replace -a '${PKG_VER}' $pkg_ver
            | str replace -a '${ZENOH_VER}' $zenoh_ver
            | str replace -a '${WIRESHARK_VER}' $wireshark_ver
            | str replace -a '${SHA256SUM}' $sha256sum)

          $note | save release-note.md

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          files: ARTIFACTS/*/*.zip
          generate_release_notes: true
          body_path: release-note.md
          append_body: true
          tag_name: ${{ inputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_TOKEN_WORKFLOW }}
