name: nix

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: nix build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: flake check
        run: nix flake check --no-build --accept-flake-config

      - name: build libzenoh_codec_ffi
        run: nix build .#libzenoh_codec_ffi --accept-flake-config --print-build-logs

      - name: build packet-zenoh
        run: nix build .#packet-zenoh --accept-flake-config --print-build-logs

      - name: devShell smoke test
        run: |
          nix develop --accept-flake-config --command bash -c '
            set -e
            echo "WIRESHARK_PLUGIN_DIR=$WIRESHARK_PLUGIN_DIR"
            test -n "$WIRESHARK_PLUGIN_DIR"
            tshark --version >/dev/null
          '

      - name: verify plugin loads in tshark
        run: |
          nix develop --accept-flake-config --command bash -c '
            set -x
            PLUGIN="$(find "$WIRESHARK_PLUGIN_DIR" -name packet-zenoh.so | head -1)"
            echo "plugin: $PLUGIN"
            if [ "$(uname)" = "Darwin" ]; then
              otool -L "$PLUGIN" || true
              otool -l "$PLUGIN" | grep -A2 LC_RPATH || true
            else
              ldd "$PLUGIN" || true
              readelf -d "$PLUGIN" | grep -E "RPATH|RUNPATH|NEEDED" || true
            fi
            echo "--- tshark plugin scan ---"
            tshark -G plugins 2>&1 | grep -i zenoh || echo "NOT IN plugins"
            tshark -G protocols 2>&1 | grep -i zenoh || echo "NOT IN protocols"
            tshark -G fields 2>&1 | grep -E "zenoh\.transport" | head -3 || echo "NO zenoh.transport fields"
          '
          # Gate on actual protocol registration
          nix develop --accept-flake-config --command bash -c '
            set -e
            tshark -G protocols 2>&1 | grep -iq "zenoh"
          '
